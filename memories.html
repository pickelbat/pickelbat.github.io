<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You For The Memories</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Georgia', serif;
    }

    /* ── WALL ── */
    #wall {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 8px;
      padding: 8px;
      opacity: 0;
      transition: opacity 2s ease 0.5s;
    }
    #wall.visible { opacity: 1; }

    .reel-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      animation: float 0s ease-in-out infinite alternate;
      transform-origin: center center;
      will-change: transform;
    }

    .reel-card iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      pointer-events: none; /* prevents interaction while overlay is showing */
    }

    /* Each card gets a unique float animation delay & duration */
    .reel-card:nth-child(1)  { animation: float 6.1s ease-in-out infinite alternate; animation-delay: 0s; }
    .reel-card:nth-child(2)  { animation: float 7.3s ease-in-out infinite alternate; animation-delay: -1.2s; }
    .reel-card:nth-child(3)  { animation: float 5.8s ease-in-out infinite alternate; animation-delay: -2.4s; }
    .reel-card:nth-child(4)  { animation: float 6.7s ease-in-out infinite alternate; animation-delay: -0.8s; }
    .reel-card:nth-child(5)  { animation: float 7.9s ease-in-out infinite alternate; animation-delay: -3.1s; }
    .reel-card:nth-child(6)  { animation: float 5.5s ease-in-out infinite alternate; animation-delay: -1.9s; }
    .reel-card:nth-child(7)  { animation: float 8.2s ease-in-out infinite alternate; animation-delay: -0.5s; }
    .reel-card:nth-child(8)  { animation: float 6.4s ease-in-out infinite alternate; animation-delay: -2.7s; }
    .reel-card:nth-child(9)  { animation: float 7.1s ease-in-out infinite alternate; animation-delay: -1.5s; }
    .reel-card:nth-child(10) { animation: float 5.9s ease-in-out infinite alternate; animation-delay: -3.8s; }

    @keyframes float {
      0%   { transform: translateY(0px)   rotate(-0.6deg) scale(1.00); }
      50%  { transform: translateY(-10px) rotate(0deg)    scale(1.01); }
      100% { transform: translateY(4px)   rotate(0.6deg)  scale(0.99); }
    }

    /* Dim overlay so text pops */
    #wall::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      pointer-events: none;
      z-index: 1;
    }

    /* ── OVERLAY TEXT ── */
    #message {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      transition: opacity 2.5s ease;
    }
    #message.fade-out { opacity: 0; pointer-events: none; }

    .msg-line {
      overflow: hidden;
      text-align: center;
    }

    .msg-text {
      display: block;
      color: #fff;
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(30px);
      animation: slideUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .msg-line:nth-child(1) .msg-text { animation-delay: 0.3s; font-size: clamp(1.2rem, 3vw, 2.2rem); letter-spacing: 0.35em; color: rgba(255,255,255,0.5); }
    .msg-line:nth-child(2) .msg-text { animation-delay: 0.8s; }
    .msg-line:nth-child(3) .msg-text { animation-delay: 1.3s; }
    .msg-line:nth-child(4) .msg-text { animation-delay: 1.8s; font-size: clamp(1rem, 2vw, 1.4rem); letter-spacing: 0.45em; color: rgba(255,255,255,0.35); margin-top: 1.5rem; }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── SPOTIFY PLAYER ── */
    #spotify {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 20;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }
    #spotify.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Minimise / maximise toggle */
    #spotify-toggle {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 21;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      font-size: 0.65rem;
      padding: 3px 7px;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.05em;
      backdrop-filter: blur(4px);
    }

    #spotify.mini iframe { height: 80px; }
  </style>
</head>
<body>

  <!-- ── OVERLAY MESSAGE ── -->
  <div id="message">
    <div class="msg-line"><span class="msg-text">for you</span></div>
    <div class="msg-line"><span class="msg-text">thank you</span></div>
    <div class="msg-line"><span class="msg-text">for the memories</span></div>
    <div class="msg-line"><span class="msg-text">— always</span></div>
  </div>

  <!-- ── TIKTOK WALL ── -->
  <!-- Replace each VIDEO_ID with a real TikTok video ID (the number at the end of a TikTok URL) -->
  <div id="wall">
    <div class="reel-card"><iframe src="https://www.tiktok.com/embed/v2/VIDEO_ID_1"  allowfullscreen allow="autoplay"></iframe></div>
    <div class="reel-card"><iframe src="https://www.tiktok.com/embed/v2/VIDEO_ID_2"  allowfullscreen allow="autoplay"></iframe></div>
    <div class="reel-card"><iframe src="https://www.tiktok.com/embed/v2/VIDEO_ID_3"  allowfullscreen allow="autoplay"></iframe></div>
    <div class="reel-card"><iframe src="https://www.tiktok.com/embed/v2/VIDEO_ID_4"  allowfullscreen allow="autoplay"></iframe></div>
    <div class="reel-card"><iframe src="https://www.tiktok.com/embed/v2/VIDEO_ID_5"  allowfullscreen allow="autoplay"></iframe></div>
    <div class="reel-card"><iframe src="https://www.tiktok.com/embed/v2/VIDEO_ID_6"  allowfullscreen allow="autoplay"></iframe></div>
    <div class="reel-card"><iframe src="https://www.tiktok.com/embed/v2/VIDEO_ID_7"  allowfullscreen allow="autoplay"></iframe></div>
    <div class="reel-card"><iframe src="https://www.tiktok.com/embed/v2/VIDEO_ID_8"  allowfullscreen allow="autoplay"></iframe></div>
    <div class="reel-card"><iframe src="https://www.tiktok.com/embed/v2/VIDEO_ID_9"  allowfullscreen allow="autoplay"></iframe></div>
    <div class="reel-card"><iframe src="https://www.tiktok.com/embed/v2/VIDEO_ID_10" allowfullscreen allow="autoplay"></iframe></div>
  </div>

  <!-- ── SPOTIFY PLAYER ── -->
  <!-- Replace SPOTIFY_URI with: artist/ARTIST_ID  or  playlist/PLAYLIST_ID  or  track/TRACK_ID -->
  <!-- Find the ID in any Spotify share link, e.g. open.spotify.com/artist/4dpARuHxo51G3z768sgnrY -->
  <div id="spotify">
    <button id="spotify-toggle" onclick="toggleSpotify()">— min</button>
    <iframe
      id="spotify-iframe"
      src="https://open.spotify.com/embed/artist/SPOTIFY_ARTIST_ID?utm_source=generator&theme=0"
      width="320"
      height="152"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </div>

  <script>
    // ── Sequence ──
    // 1. Message fades in (CSS handles it)
    // 2. After 4.5s, message fades out
    // 3. Wall + Spotify fade in behind it

    const message  = document.getElementById('message');
    const wall     = document.getElementById('wall');
    const spotify  = document.getElementById('spotify');

    // Enable card interactivity after the overlay is gone
    function enableCards() {
      document.querySelectorAll('.reel-card iframe').forEach(f => f.style.pointerEvents = 'auto');
    }

    setTimeout(() => {
      message.classList.add('fade-out');
      wall.classList.add('visible');

      setTimeout(() => {
        spotify.classList.add('visible');
        enableCards();
      }, 800);
    }, 4500);

    // ── Spotify mini-player toggle ──
    let mini = false;
    function toggleSpotify() {
      mini = !mini;
      const sp  = document.getElementById('spotify');
      const btn = document.getElementById('spotify-toggle');
      const iframe = document.getElementById('spotify-iframe');
      if (mini) {
        iframe.style.height = '80px';
        btn.textContent = '+ max';
      } else {
        iframe.style.height = '152px';
        btn.textContent = '— min';
      }
    }
  </script>
</body>
</html>
